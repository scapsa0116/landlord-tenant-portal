<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Tenant Information</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#F0F2FA;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 60px}
    .wrap{width:100%;max-width:480px}
    .hero{background:linear-gradient(135deg,#4361EE 0%,#6C63FF 100%);border-radius:24px;padding:28px 24px 24px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;width:160px;height:160px;border-radius:80px;background:rgba(255,255,255,.08);top:-40px;right:-30px;pointer-events:none}
    .hero::after{content:'';position:absolute;width:100px;height:100px;border-radius:50px;background:rgba(255,255,255,.05);bottom:-20px;left:20px;pointer-events:none}
    .hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.2px;opacity:.7;text-transform:uppercase;margin-bottom:6px}
    .hero-title{font-size:26px;font-weight:900;line-height:1.2;margin-bottom:4px}
    .hero-loc{font-size:14px;opacity:.75;margin-bottom:18px}
    .rent-chip{display:inline-flex;align-items:center;background:rgba(255,255,255,.2);border-radius:30px;padding:8px 20px;font-size:22px;font-weight:900;letter-spacing:-.5px}
    .card{background:#fff;border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 2px 20px rgba(67,97,238,.08)}
    .card-title{font-size:13px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:20px}
    .field{margin-bottom:18px}
    .field:last-child{margin-bottom:0}
    .field label{display:block;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .field input{display:block;width:100%;background:#F0F2FA;border:2px solid transparent;border-radius:14px;padding:15px 18px;font-size:16px;color:#1A1D2E;outline:none;-webkit-appearance:none;transition:border-color .15s}
    .field input:focus{border-color:#4361EE;background:#fff}
    .field input::placeholder{color:#C4C9D4}
    .err-msg{display:none;color:#EF4444;font-size:13px;font-weight:600;margin-top:10px;padding:10px 14px;background:#FEE2E2;border-radius:10px}
    .err-msg.on{display:block}
    .submit-btn{display:block;width:100%;background:#4361EE;color:#fff;border:none;border-radius:18px;padding:19px 24px;font-size:17px;font-weight:800;cursor:pointer;text-align:center;transition:opacity .2s,transform .1s;-webkit-appearance:none;margin-bottom:12px}
    .submit-btn:disabled{opacity:.55;cursor:not-allowed}
    .submit-btn:active:not(:disabled){transform:scale(.98)}
    .secure-note{text-align:center;color:#9CA3AF;font-size:12px;line-height:1.5}
    .success{display:none;text-align:center;padding:60px 20px}
    .success.on{display:block}
    .success-icon{font-size:80px;margin-bottom:20px}
    .success-title{font-size:28px;font-weight:900;color:#1A1D2E;margin-bottom:10px}
    .success-body{color:#6B7280;font-size:16px;line-height:1.6}
    .error-page{text-align:center;padding:60px 20px}
    .error-icon{font-size:64px;margin-bottom:18px}
    .error-title{font-size:22px;font-weight:900;color:#1A1D2E;margin-bottom:10px}
    .error-body{color:#6B7280;font-size:15px;line-height:1.6}
    .loading{text-align:center;padding:60px 20px;color:#6B7280;font-size:16px}
    #main{display:none}
  </style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="loading">Loading your invite…</div>
  <div id="error-view" class="error-page" style="display:none">
    <div class="error-icon">🔗</div>
    <div class="error-title">Link Unavailable</div>
    <div id="error-body" class="error-body"></div>
  </div>

  <div id="main" style="display:none">
    <!-- Form view -->
    <div id="form-view">
      <div class="hero">
        <div class="hero-eyebrow">Tenant Onboarding</div>
        <div class="hero-title">Welcome!</div>
        <div id="hero-loc" class="hero-loc"></div>
        <div id="rent-chip" class="rent-chip"></div>
      </div>

      <div class="card">
        <div class="card-title">Your Information</div>

        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="Jane Smith" autocomplete="name" inputmode="text"/>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="jane@example.com" autocomplete="email" inputmode="email"/>
        </div>

        <div class="field">
          <label for="phone">Phone Number</label>
          <input id="phone" type="tel" placeholder="(555) 123-4567" autocomplete="tel" inputmode="tel"/>
        </div>

        <div id="err-msg" class="err-msg"></div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
        Submit My Information
      </button>
      <div class="secure-note">🔒 Your information is sent securely to your landlord.</div>
    </div>

    <!-- Success view -->
    <div class="success" id="success-view">
      <div class="success-icon">✅</div>
      <div class="success-title">You're all set!</div>
      <div class="success-body">
        Your information has been saved.<br/>
        Your landlord will be in touch soon.<br/><br/>
        You may close this page.
      </div>
    </div>
  </div>
</div>

<script>
  var API_BASE = 'https://iykkkfcwuparqtomyaow.supabase.co/functions/v1/tenant-onboarding';
  var token    = new URLSearchParams(window.location.search).get('token') || '';
  var busy     = false;

  function showError(msg) {
    document.getElementById('loading').style.display    = 'none';
    document.getElementById('main').style.display       = 'none';
    document.getElementById('error-body').textContent   = msg;
    document.getElementById('error-view').style.display = 'block';
  }

  function showForm(info) {
    document.getElementById('loading').style.display = 'none';
    var rentFmt  = '$' + Number(info.rent).toLocaleString('en-US');
    var location = info.buildingName
      ? info.buildingName + ' · Unit ' + info.unitNumber
      : 'Unit ' + info.unitNumber;
    document.getElementById('hero-loc').textContent   = location;
    document.getElementById('rent-chip').textContent  = rentFmt + '/mo';
    document.getElementById('main').style.display     = 'block';
  }

  async function loadInvite() {
    if (!token) { showError('No invite token was provided in this link.'); return; }
    try {
      var res  = await fetch(API_BASE + '?action=info&token=' + encodeURIComponent(token));
      var json = await res.json();
      if (json.error) { showError(json.error); return; }
      showForm(json);
    } catch (e) {
      showError('Unable to load this invite. Please check your connection and try again.');
    }
  }

  async function handleSubmit() {
    if (busy) return;
    var name  = document.getElementById('name').value.trim();
    var email = document.getElementById('email').value.trim();
    var phone = document.getElementById('phone').value.trim();
    var errEl = document.getElementById('err-msg');
    errEl.classList.remove('on');

    if (!name) {
      errEl.textContent = 'Please enter your full name.';
      errEl.classList.add('on');
      document.getElementById('name').focus();
      return;
    }
    if (!email || !email.includes('@')) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.classList.add('on');
      document.getElementById('email').focus();
      return;
    }

    busy = true;
    var btn = document.getElementById('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    try {
      var res  = await fetch(API_BASE + '?action=submit', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token: token, name: name, email: email, phone: phone }),
      });
      var json = await res.json();
      if (json.error) throw new Error(json.error);

      document.getElementById('form-view').style.display   = 'none';
      document.getElementById('success-view').classList.add('on');
    } catch (err) {
      errEl.textContent = err.message || 'Something went wrong. Please try again.';
      errEl.classList.add('on');
      btn.disabled    = false;
      btn.textContent = 'Submit My Information';
      busy = false;
    }
  }

  loadInvite();
</script>
</body>
</html>
